<!DOCTYPE html>
<html>
<head>
  <style>
    body::before {
      content: "";
      position: fixed;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 2px;
      background: red;
      pointer-events: none;
    }

    h3 {
      width: auto;
      align-self: center;
      justify-content: center;
      align-items: center;
      vertical-align: middle;
      transform: translateX(-50%);
      left: 50%;
      right: 50%;
      place-self: center;
      justify-self: center;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>
  <h3>how center div help</h3>
  </div>
</body>
</html>
