<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Chatter</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body>
  <div class="chat-container">
    <!-- ======================
         Sidebar: Rooms / DMs / Groups
         ====================== -->
    <aside class="sidebar">
      <nav>
        <input type="checkbox" id="sidebar-active">

        <label for="sidebar-active" class="open-sidebar-button">
          <!-- Menu Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" height="32px" viewBox="0 -960 960 960" width="32px">
            <path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/>
          </svg>
        </label>

        <div class="links-container">
          <label for="sidebar-active" class="close-sidebar-button">
            <!-- Close Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" height="32px" viewBox="0 -960 960 960" width="32px">
              <path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/>
            </svg>
          </label>

          <a href="#">Home</a>
          <a href="#">Voicechats</a>
          <a href="#">Settings</a>
          <a href="#">About us!</a>
          <a href="{{ url_for('no') }}">Log Out</a>
        </div>
      </nav>

      <h3>Rooms</h3>
      <div id="roomLinks" class="link-bar"></div>

      <h3>DMs</h3>
      <div id="dmLinks" class="link-bar"></div>

      <h3>Groups</h3>
      <div id="groupLinks" class="link-bar"></div>

      <!-- Create new group -->
      <div class="group-panel">
        <input id="groupNameInput" placeholder="New group name">
        <button id="createGroupBtn">Create</button>
      </div>

      <!-- Invite user to group -->
      <div class="group-panel">
        <input id="inviteInput" placeholder="Invite username">
        <button id="inviteBtn">Invite</button>
      </div>

      <h3>Members</h3>
      <div id="memberlist" class="link-bar"></div>
    </aside>

    <!-- ======================
    Main Chat Area
    ====================== -->
    <main class="chat-main">
      <!-- Topbar -->
      <header class="topbar">
        <div id="locationDisplay" class="location-bar"></div>

        <h2>Chatter</h2>

        <button id="theme-btn">
        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="var(--color-fg-primary)"><path d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T444-660q0 90 63 153t153 63q55 0 101-24.5t75-65.5q2 13 3 26.5t1 27.5q0 150-105 255T480-120Zm0-80q88 0 158-48.5T740-375q-20 5-40 8t-40 3q-123 0-209.5-86.5T364-660q0-20 3-40t8-40q-78 32-126.5 102T200-480q0 116 82 198t198 82Zm-10-270Z"/></svg>
        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="var(--color-fg-primary)"><path d="M480-360q50 0 85-35t35-85q0-50-35-85t-85-35q-50 0-85 35t-35 85q0 50 35 85t85 35Zm0 80q-83 0-141.5-58.5T280-480q0-83 58.5-141.5T480-680q83 0 141.5 58.5T680-480q0 83-58.5 141.5T480-280ZM200-440H40v-80h160v80Zm720 0H760v-80h160v80ZM440-760v-160h80v160h-80Zm0 720v-160h80v160h-80ZM256-650l-101-97 57-59 96 100-52 56Zm492 496-97-101 53-55 101 97-57 59Zm-98-550 97-101 59 57-100 96-56-52ZM154-212l101-97 55 53-97 101-59-57Zm326-268Z"/></svg>
        </button>

        <div class="user-info">
          Logged in as: <strong>{{ username }}</strong> — <a href="{{ url_for('logout') }}">Logout</a>
        </div>
      </header>

      <!-- Messages -->
      <div id="messages" class="messages"></div>

      <!-- Input row -->
      <div class="input-row">
        <input id="messageInput" placeholder="Type a message..." autocomplete="off">
        <button id="sendBtn">Send</button>
      </div>
    </main>
  </div>

  <script>
    window.CHAT_MODE = "{{ mode }}";
    window.CHAT_TARGET = "{{ target }}";
  </script>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
  <script src="{{ url_for('static', filename='lightmode.js') }}" defer></script>
</body>
</html>
